{% extends "base.html" %}
{% block title %}Inbox{% endblock %}
{% block content %}
<div class="page-content">
<h1>Inbox</h1>

<div id="inbox-active"
     hx-get="/dashboard/partials/inbox-active"
     hx-trigger="load, refresh"
     hx-swap="innerHTML">
  <div class="card"><div class="muted">Loading...</div></div>
</div>
</div>

<script>
// Track whether a clear-and-refresh is in progress so the edit
// guard doesn't block it.
window._yetiClearing = false;

window.clearAndRefresh = function() {
    const root = document.getElementById('inbox-active');
    // Wipe inputs first so the edit guard won't block the reload
    root.querySelectorAll(
        'input[type="text"], textarea, input[type="hidden"]'
    ).forEach(el => { el.value = ''; });
    window._yetiClearing = true;
    if (window.htmx) {
        htmx.trigger(root, 'refresh');
    } else {
        root.dispatchEvent(new Event('refresh'));
    }
    setTimeout(() => { window._yetiClearing = false; }, 1000);
};

window.toggleAutoApply = async function(patternKey, enabled) {
    const r = await fetch('/api/inbox/patterns/auto-apply', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({
            pattern_key: patternKey,
            auto_apply: enabled
        })
    });
    if (!r.ok) {
        console.error('Failed to toggle pattern:', r.status);
        return;
    }
    window.clearAndRefresh();
};

window.resolveInboxItem = async function(itemId, resolution) {
    try {
        const r = await fetch('/api/inbox/' + itemId + '/resolve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify({resolution: resolution})
        });
        if (r.ok) {
            window.clearAndRefresh();
        } else {
            console.error('Failed to resolve item:', r.status);
        }
    } catch(e) {
        console.error('Error resolving item:', e);
    }
};

// Edit guard: skip refresh if user has unsaved input.
// Only blocks the auto-refresh GET on the container itself —
// button-initiated POST/PATCH from children always go through.
(function() {
    const target = document.getElementById('inbox-active');

    function isUserEditing() {
        if (window._yetiClearing) return false;
        const inputs = target.querySelectorAll(
            'input[type="text"], textarea'
        );
        for (const el of inputs) {
            if (document.activeElement === el) return true;
            if (el.value && el.value.trim()) return true;
        }
        return false;
    }

    target.addEventListener('htmx:beforeRequest', (evt) => {
        // Only intercept the auto-refresh of the container itself
        if (evt.target !== target) return;
        if (isUserEditing()) {
            evt.preventDefault();
        }
    });
})();
</script>
{% endblock %}
