{% extends "base.html" %}
{% block title %}People{% endblock %}
{% block content %}
<div class="page-content">
<h1>People</h1>

<div class="card">
  <h2>Known contacts</h2>
  <input type="text" id="people-search"
         placeholder="Search by name, email, company..."
         hx-get="/dashboard/partials/people-contacts"
         hx-trigger="keyup changed delay:300ms, load"
         hx-target="#people-contacts"
         hx-swap="innerHTML"
         name="q"
         autocomplete="off"
         style="width:100%;padding:0.55rem 0.75rem;
                background:var(--bg);border:1px solid var(--border);
                border-radius:4px;color:var(--text);
                font-size:0.85rem;outline:none;
                margin-bottom:0.75rem;font-family:inherit">
  <div id="people-contacts">
    <div class="muted">Loading...</div>
  </div>
</div>

<div id="contact-detail-backdrop" class="modal-backdrop"
     onclick="if(event.target===this)closeContact()">
  <div class="modal" id="contact-detail"
       style="max-width:760px;max-height:85vh;overflow-y:auto">
    <h2 id="contact-detail-name">Contact</h2>
    <div id="contact-detail-body"
         style="font-size:0.85rem;color:var(--text-soft);
                line-height:1.5"></div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm"
              onclick="deleteContact()">Delete drawer</button>
      <button class="secondary" onclick="closeContact()">Close</button>
    </div>
  </div>
</div>
</div>

<script>
window.askYetiAbout = function(name, email, count) {
    const input = document.querySelector(
        '.global-chat-input input[name="message"]'
    );
    const form = document.querySelector('.global-chat-input');
    if (!input || !form) return;
    const subject = name && name.trim() ? name : email;
    const idTail = email ? " (" + email + ")" : "";
    const evidence = count > 0
        ? "They've sent me " + count +
          " emails recently and you have no record yet."
        : "You have KG facts about them but no contact drawer.";
    input.value =
        "Add a contact profile for " + subject + idTail +
        ". " + evidence + " Ask me whatever you need — full " +
        "name, role, company, how we work together — one " +
        "question at a time, then save the drawer in " +
        "wing=people, room=contacts.";
    input.focus();
    if (window.htmx) {
        htmx.trigger(form, 'submit');
    } else {
        form.requestSubmit();
    }
};

window._currentContact = null;

window.openContact = async function(id, name) {
    const r = await fetch(
        '/dashboard/partials/people-contact-body?id=' +
        encodeURIComponent(id)
    );
    const body = await r.text();
    window._currentContact = { id: id, name: name };
    document.getElementById('contact-detail-name').textContent =
        name || 'Contact';
    document.getElementById('contact-detail-body').innerHTML = body;
    const bd = document.getElementById('contact-detail-backdrop');
    bd.classList.add('open');
    bd.scrollTop = 0;
    const modal = document.getElementById('contact-detail');
    if (modal) modal.scrollTop = 0;
};

window.closeContact = function() {
    window._currentContact = null;
    document.getElementById('contact-detail-backdrop')
        .classList.remove('open');
};

window.deleteContact = async function() {
    const c = window._currentContact;
    if (!c) return;
    const ok = window.confirm(
        'Delete drawer for "' + (c.name || 'this contact') +
        '"? This cannot be undone.'
    );
    if (!ok) return;
    const row = document.querySelector(
        '[data-drawer-id="' + c.id + '"]'
    );
    if (row) row.remove();
    closeContact();
    const r = await fetch(
        '/dashboard/api/contacts/' +
        encodeURIComponent(c.id) + '/delete',
        { method: 'POST', credentials: 'include' }
    );
    const search = document.getElementById('people-search');
    if (!r.ok) {
        let detail = r.status;
        try {
            const j = await r.json();
            detail = j.error || detail;
        } catch (e) { /* ignore */ }
        alert('Delete failed: ' + detail);
        if (window.htmx && search) htmx.trigger(search, 'keyup');
        return;
    }
    if (window.htmx && search) {
        htmx.trigger(search, 'keyup');
    }
};
</script>
{% endblock %}
