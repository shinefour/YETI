{% extends "base.html" %}
{% block title %}Chat{% endblock %}
{% block content %}
<h1>Chat with YETI</h1>

<div class="chat-container">
    <div class="chat-messages" id="messages"></div>

    <form class="chat-input" hx-post="/dashboard/partials/chat"
          hx-target="#messages" hx-swap="beforeend"
          hx-on::after-request="this.reset(); document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight">
        <input type="text" name="message" placeholder="Ask YETI something..." autocomplete="off" autofocus>
        <button type="submit">Send</button>
    </form>
</div>
{% endblock %}
