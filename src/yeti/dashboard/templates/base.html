<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YETI — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #050507;
            --surface: #1a1a22;
            --surface-hover: #22222b;
            --surface-strong: #25252f;
            --border: #34343e;
            --border-strong: #4a4a56;
            --text: #f4f4f5;
            --text-soft: #c4c4cc;
            --text-dim: #8b8b95;
            --accent: #7eaaff;
            --accent-soft: #4a73c0;
            --accent-bg: #1a2540;
            --green: #4ade80;
            --green-bg: #0f2a1a;
            --yellow: #facc15;
            --red: #f87171;
            --red-bg: #2a0f12;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }
        .layout {
            display: grid;
            grid-template-columns: 180px 1fr 360px;
            height: 100vh;
            overflow: hidden;
        }
        @media (max-width: 1100px) {
            .layout { grid-template-columns: 180px 1fr; }
            .global-chat { display: none; }
        }
        nav {
            border-right: 1px solid var(--border);
            padding: 2rem 0.75rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }
        nav .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 2rem;
            padding: 0 0.5rem;
            letter-spacing: 0.1em;
        }
        nav .nav-links { flex: 1; }
        nav a {
            display: block;
            padding: 0.5rem 0.6rem;
            color: var(--text-soft);
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 2px;
            font-size: 0.9rem;
        }
        nav a:hover { background: var(--surface-hover); color: var(--text); }
        nav a.active {
            background: var(--surface);
            color: var(--text);
            border-left: 2px solid var(--accent);
        }
        nav a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        .nav-count {
            font-size: 0.7rem;
            font-weight: 500;
            min-width: 1.4rem;
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
            text-align: center;
            background: var(--surface-strong);
            color: var(--text-dim);
        }
        .nav-count:empty { display: none; }
        .nav-count.has-items {
            background: var(--accent-bg);
            color: var(--accent);
        }
        nav .sidebar-section {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: 1rem;
        }
        nav .sidebar-section h3 {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            margin-bottom: 0.5rem;
            padding: 0 0.5rem;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.2rem 0.5rem;
            font-size: 0.78rem;
            gap: 0.5rem;
            min-width: 0;
        }
        .status-item .name {
            color: var(--text-soft);
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .status-item .dot {
            flex: 0 0 auto;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .dot-green { background: var(--green); }
        .dot-yellow { background: var(--yellow); }
        .dot-red { background: var(--red); }
        .dot-dim { background: var(--text-dim); opacity: 0.3; }
        main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .global-chat {
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            background: var(--surface);
            height: 100vh;
        }
        .global-chat-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .global-chat-clear {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: none;
            letter-spacing: normal;
        }
        .global-chat-clear:hover { color: var(--text); }
        .global-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
        }
        .global-chat-input {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }
        .global-chat-input input {
            flex: 1;
            padding: 0.55rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            font-family: inherit;
        }
        .global-chat-input input:focus { border-color: var(--accent); }
        .global-chat-input button {
            padding: 0.55rem 1rem;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .global-chat-input button:hover { border-color: var(--accent); }
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 2.5rem;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: var(--text);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
        }
        .grid { display: grid; gap: 1rem; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        @media (max-width: 900px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.65rem 0;
            gap: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .status-row:last-child { border-bottom: none; }
        .status-row:first-child { padding-top: 0.25rem; }

        /* Button system */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-soft);
            font-family: inherit;
            line-height: 1;
            transition: all 150ms;
            white-space: nowrap;
        }
        .btn:hover {
            background: var(--surface-hover);
            color: var(--text);
            border-color: var(--border-strong);
        }
        .btn-primary {
            background: var(--accent-bg);
            color: var(--accent);
            border-color: var(--accent-soft);
        }
        .btn-primary:hover {
            background: var(--accent-soft);
            color: white;
            border-color: var(--accent);
        }
        .btn-success {
            background: var(--green-bg);
            color: var(--green);
            border-color: rgba(74, 222, 128, 0.3);
        }
        .btn-success:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: var(--green);
        }
        .btn-danger {
            background: var(--red-bg);
            color: var(--red);
            border-color: rgba(248, 113, 113, 0.3);
        }
        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: var(--red);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-dim);
            border-color: var(--border);
        }
        .btn-ghost:hover {
            color: var(--text-soft);
        }
        .btn-sm {
            padding: 0.3rem 0.65rem;
            font-size: 0.72rem;
        }
        .btn-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--surface-strong);
            color: var(--text-soft);
        }
        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-yellow { background: rgba(250, 204, 21, 0.15); color: var(--yellow); }
        .badge-red { background: var(--red-bg); color: var(--red); }
        .badge-dim { background: var(--surface-strong); color: var(--text-dim); }

        /* Chat */
        .chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1.5rem 2.5rem 1rem;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 1rem;
        }
        .chat-msg {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .chat-msg:last-child { border-bottom: none; }
        .chat-msg strong { color: var(--text-dim); font-weight: 400; margin-right: 0.5rem; }
        .chat-msg.user strong { color: var(--accent); }
        .chat-input {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
        }
        .chat-input input {
            flex: 1;
            padding: 0.6rem 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
        }
        .chat-input input:focus { border-color: var(--text-dim); }
        .chat-input button {
            padding: 0.6rem 1.25rem;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .chat-input button:hover { border-color: var(--accent); }
        .chat-thinking {
            color: var(--text-dim);
            font-size: 0.8rem;
            padding: 0.5rem 1.5rem;
            display: none;
        }
        .chat-thinking.active { display: block; }
        @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
        .chat-thinking span { animation: pulse 1.5s infinite; }
        .htmx-request .chat-thinking { display: block; }
        .htmx-request .chat-input button,
        .htmx-request .global-chat-input button {
            opacity: 0.3;
            pointer-events: none;
        }
        .muted { color: var(--text-dim); }

        /* Inbox tile */
        .inbox-tile {
            border: 1px solid var(--border);
            border-left: 3px solid var(--text-dim);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: border-color 200ms;
        }
        .inbox-tile:hover { border-color: var(--text-dim); }
        .inbox-tile-empty { cursor: default; opacity: 0.5; }
        .inbox-count {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
        }
        .inbox-active { font-size: 0.95rem; }
        .inbox-hint { font-size: 0.8rem; }
        .inbox-upcoming {
            list-style: none;
            margin-top: 0.5rem;
            padding-left: 0;
            font-size: 0.8rem;
        }
        .inbox-upcoming li {
            padding: 0.2rem 0;
            border-bottom: 1px solid var(--border);
        }
        .inbox-upcoming li:last-child { border-bottom: none; }

        /* Home / control center */
        .tile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 700px) {
            .tile-grid { grid-template-columns: 1fr; }
        }
        .tile {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            cursor: pointer;
            transition: border-color 200ms, background 200ms;
            display: flex;
            flex-direction: column;
            min-height: 120px;
        }
        .tile:hover {
            background: var(--surface-hover);
            border-color: var(--border-strong);
        }
        .tile-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .tile-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.4rem;
        }
        .tile-detail {
            font-size: 0.85rem;
            color: var(--text-soft);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tile-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tile-action {
            background: var(--surface);
            border: 1px solid var(--accent-soft);
            color: var(--accent);
        }
        .tile-action:hover { border-color: var(--accent); }
        .tile-action .tile-value {
            color: var(--accent);
        }
        .pulse-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 4px;
        }
        /* Note modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            padding: 1.5rem;
            width: 90%;
            max-width: 600px;
        }
        .modal h2 {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 1rem;
        }
        .modal textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
        }
        .modal textarea:focus { border-color: var(--accent); }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .modal-actions button {
            padding: 0.55rem 1.25rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            background: transparent;
            border: 1px solid var(--border);
        }
        .modal-actions .primary {
            color: var(--accent);
            border-color: var(--accent-soft);
        }
        .modal-actions .primary:hover { border-color: var(--accent); }
        .modal-actions .secondary { color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="layout">
        <nav>
            <div class="logo">YETI</div>
            <div class="nav-links">
                <a href="/dashboard" {% if active == "home" %}class="active"{% endif %}>
                    <span>Home</span>
                </a>
                <a href="/dashboard/inbox" {% if active == "inbox" %}class="active"{% endif %}>
                    <span>Inbox</span>
                    <span class="nav-count" id="nav-count-inbox"></span>
                </a>
                <a href="/dashboard/notes" {% if active == "notes" %}class="active"{% endif %}>
                    <span>Notes</span>
                </a>
                <a href="/dashboard/tasks" {% if active == "tasks" %}class="active"{% endif %}>
                    <span>Tasks</span>
                    <span class="nav-count" id="nav-count-tasks"></span>
                </a>
                <a href="/dashboard/people" {% if active == "people" %}class="active"{% endif %}>
                    <span>People</span>
                    <span class="nav-count" id="nav-count-people"></span>
                </a>
                <a href="/dashboard/usage" {% if active == "usage" %}class="active"{% endif %}>
                    <span>Usage</span>
                </a>
            </div>
            <div hx-get="/dashboard/partials/nav-counts"
                 hx-trigger="load, every 30s, refresh from:body"
                 hx-swap="innerHTML"
                 style="display:none"></div>
            <div class="sidebar-section"
                 hx-get="/dashboard/partials/status-sidebar"
                 hx-trigger="load, every 30s" hx-swap="innerHTML">
            </div>
            <div class="sidebar-section"
                 hx-get="/dashboard/partials/usage-sidebar"
                 hx-trigger="load, every 60s" hx-swap="innerHTML">
            </div>
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
        <aside class="global-chat" id="global-chat">
            <div class="global-chat-header">
                <span>Chat with YETI</span>
                <button class="global-chat-clear"
                        onclick="document.getElementById('global-chat-messages').innerHTML=''">
                    clear
                </button>
            </div>
            <div class="global-chat-messages" id="global-chat-messages"></div>
            <div class="chat-thinking" id="global-chat-thinking">
                <span>YETI is thinking...</span>
            </div>
            <form class="global-chat-input"
                  hx-post="/dashboard/partials/chat"
                  hx-target="#global-chat-messages"
                  hx-swap="beforeend"
                  hx-indicator="#global-chat"
                  hx-on::after-request="this.reset();
                    document.getElementById('global-chat-messages').scrollTop =
                    document.getElementById('global-chat-messages').scrollHeight">
                <input type="text" name="message"
                       placeholder="Ask YETI..."
                       autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </aside>
    </div>

    <script>
    // SSE connection (re-used across pages)
    if (typeof EventSource !== 'undefined') {
        const evt = new EventSource('/dashboard/events');
        evt.addEventListener('update', () => {
            document.body.dispatchEvent(new Event('refresh'));
        });
    }
    </script>
</body>
</html>
