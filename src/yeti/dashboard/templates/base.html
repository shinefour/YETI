<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YETI — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #09090b;
            --border: #1e1e22;
            --text: #d4d4d8;
            --text-dim: #5a5a65;
            --accent: #6c9fff;
            --green: #4ade80;
            --yellow: #facc15;
            --red: #f87171;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }
        .layout { display: flex; height: 100vh; overflow: hidden; }
        nav {
            width: 180px;
            min-width: 180px;
            border-right: 1px solid var(--border);
            padding: 2rem 0.75rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }
        nav .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 2rem;
            padding: 0 0.5rem;
            letter-spacing: 0.1em;
        }
        nav .nav-links { flex: 1; }
        nav a {
            display: block;
            padding: 0.4rem 0.5rem;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 1px;
            font-size: 0.85rem;
        }
        nav a:hover, nav a.active { color: var(--text); }
        nav .status-sidebar {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: 1rem;
        }
        nav .status-sidebar h3 {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 400;
            margin-bottom: 0.5rem;
            padding: 0 0.5rem;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.15rem 0.5rem;
            font-size: 0.75rem;
        }
        .status-item .name { color: var(--text-dim); }
        .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .dot-green { background: var(--green); }
        .dot-yellow { background: var(--yellow); }
        .dot-red { background: var(--red); }
        .dot-dim { background: var(--text-dim); opacity: 0.3; }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 2.5rem;
        }
        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            color: var(--text-dim);
        }
        .card {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 400;
        }
        .grid { display: grid; gap: 1rem; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        @media (max-width: 900px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.35rem 0;
        }
        .badge {
            font-size: 0.75rem;
            font-weight: 400;
        }
        .badge-green { color: var(--green); }
        .badge-yellow { color: var(--yellow); }
        .badge-red { color: var(--red); }
        .badge-dim { color: var(--text-dim); }

        /* Chat */
        .chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1.5rem 2.5rem 1rem;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 1rem;
        }
        .chat-msg {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .chat-msg:last-child { border-bottom: none; }
        .chat-msg strong { color: var(--text-dim); font-weight: 400; margin-right: 0.5rem; }
        .chat-msg.user strong { color: var(--accent); }
        .chat-input {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
        }
        .chat-input input {
            flex: 1;
            padding: 0.6rem 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
        }
        .chat-input input:focus { border-color: var(--text-dim); }
        .chat-input button {
            padding: 0.6rem 1.25rem;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .chat-input button:hover { border-color: var(--accent); }
        .chat-thinking {
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 0.5rem 0;
            display: none;
        }
        .chat-thinking.active { display: block; }
        @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
        .chat-thinking span { animation: pulse 1.5s infinite; }
        .htmx-request .chat-thinking { display: block; }
        .htmx-request .chat-input button { opacity: 0.3; pointer-events: none; }
        .muted { color: var(--text-dim); }

        /* Inbox tile */
        .inbox-tile {
            border: 1px solid var(--border);
            border-left: 3px solid var(--text-dim);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: border-color 200ms;
        }
        .inbox-tile:hover { border-color: var(--text-dim); }
        .inbox-tile-empty { cursor: default; opacity: 0.5; }
        .inbox-count {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
        }
        .inbox-active { font-size: 0.95rem; }
        .inbox-hint { font-size: 0.8rem; }
        .inbox-upcoming {
            list-style: none;
            margin-top: 0.5rem;
            padding-left: 0;
            font-size: 0.8rem;
        }
        .inbox-upcoming li {
            padding: 0.2rem 0;
            border-bottom: 1px solid var(--border);
        }
        .inbox-upcoming li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="layout">
        <nav>
            <div class="logo">YETI</div>
            <div class="nav-links">
                <a href="/dashboard" {% if active == "chat" %}class="active"{% endif %}>Chat</a>
                <a href="/dashboard/inbox" {% if active == "inbox" %}class="active"{% endif %}>Inbox</a>
                <a href="/dashboard/tasks" {% if active == "tasks" %}class="active"{% endif %}>Tasks</a>
                <a href="/dashboard/knowledge" {% if active == "knowledge" %}class="active"{% endif %}>Knowledge</a>
                <a href="/dashboard/people" {% if active == "people" %}class="active"{% endif %}>People</a>
                <a href="/dashboard/activity" {% if active == "activity" %}class="active"{% endif %}>Activity</a>
                <a href="/dashboard/usage" {% if active == "usage" %}class="active"{% endif %}>Usage</a>
            </div>
            <div class="status-sidebar" hx-get="/dashboard/partials/status-sidebar" hx-trigger="load, every 30s" hx-swap="innerHTML">
            </div>
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
