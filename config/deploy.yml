# Kamal 2 deployment configuration for YETI
service: yeti
image: shinefour/yeti

servers:
  web:
    hosts:
      - 178.104.179.33
  worker:
    hosts:
      - 178.104.179.33
    cmd: celery -A yeti.worker worker --loglevel=info
  scheduler:
    hosts:
      - 178.104.179.33
    cmd: celery -A yeti.worker beat --loglevel=info
  telegram:
    hosts:
      - 178.104.179.33
    cmd: python -m yeti.bot.telegram

builder:
  arch: amd64

proxy:
  host: yeti.diconve.com
  ssl: true
  app_port: 8000
  healthcheck:
    path: /health
    interval: 5

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

accessories:
  chromadb:
    image: chromadb/chroma:latest
    host: 178.104.179.33
    port: "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

  redis:
    image: redis:7-alpine
    host: 178.104.179.33
    port: "6379:6379"
    volumes:
      - redis-data:/data

  ollama:
    image: ollama/ollama:latest
    host: 178.104.179.33
    port: "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

env:
  clear:
    YETI_OLLAMA_BASE_URL: http://localhost:11434
    YETI_REDIS_URL: redis://localhost:6379/0
    YETI_MEMPALACE_URL: http://localhost:3100
    YETI_CHROMADB_URL: http://localhost:8001
  secret:
    - YETI_DASHBOARD_API_KEY
    - YETI_ANTHROPIC_API_KEY
    - YETI_OPENAI_API_KEY
    - YETI_TELEGRAM_BOT_TOKEN
    - YETI_TELEGRAM_ALLOWED_CHAT_ID
    - YETI_MICROSOFT_CLIENT_ID
    - YETI_MICROSOFT_CLIENT_SECRET
    - YETI_MICROSOFT_TENANT_ID
    - YETI_JIRA_URL
    - YETI_JIRA_EMAIL
    - YETI_JIRA_API_TOKEN
    - YETI_NOTION_API_KEY
    - YETI_SLACK_BOT_TOKEN
